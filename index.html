<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Equation Explorer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #2c3e50;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            text-align: center;
            margin-top: 0;
            color: #1a252f;
        }
        .equation-display {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #8e44ad;
            margin: 15px 0;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eef0f2;
        }
        canvas {
            background: #ffffff;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            width: 100%;
            aspect-ratio: 1;
            display: block;
        }
        .control-group {
            margin: 15px 0;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            margin: 8px 0;
            accent-color: #3498db;
        }
        .checkbox-group {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 13px;
            cursor: pointer;
        }
        .checkbox-label input {
            margin-right: 6px;
            transform: scale(1.2);
        }
        .stats {
            font-size: 13px;
            margin-top: 15px;
            padding: 10px;
            border-left: 4px solid #27ae60;
            background: #f4fbf7;
            border-radius: 0 8px 8px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Linear Equation Explorer</h1>
    
    <div class="equation-display" id="eqDisplay">y = 2.0x + 5</div>

    <canvas id="graphCanvas" width="400" height="400"></canvas>

    <div class="control-group">
        <label><span>Slope / Rate (m):</span> <span id="mVal">2.0</span></label>
        <input type="range" id="sliderM" min="0" max="5" step="0.5" value="2">
    </div>

    <div class="control-group">
        <label><span>Start Value (c):</span> <span id="cVal">5</span></label>
        <input type="range" id="sliderC" min="0" max="20" step="1" value="5">
    </div>

    <div class="control-group">
        <label><span>Current Position (x):</span> <span id="xVal">5</span></label>
        <input type="range" id="sliderX" min="0" max="10" step="1" value="5">
    </div>

    <div class="checkbox-group">
        <label class="checkbox-label">
            <input type="checkbox" id="checkRate" checked> Show Slope (Diff)
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="checkArea" checked> Show Area (Int)
        </label>
    </div>

    <div class="stats" id="statsDisplay"></div>
</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    // Controls
    const sliderM = document.getElementById('sliderM');
    const sliderC = document.getElementById('sliderC');
    const sliderX = document.getElementById('sliderX');
    const checkRate = document.getElementById('checkRate');
    const checkArea = document.getElementById('checkArea');

    // Displays
    const eqDisplay = document.getElementById('eqDisplay');
    const mVal = document.getElementById('mVal');
    const cVal = document.getElementById('cVal');
    const xVal = document.getElementById('xVal');
    const statsDisplay = document.getElementById('statsDisplay');

    // Grid Mapping Config
    const padding = 40;
    const graphWidth = canvas.width - padding * 2;
    const graphHeight = canvas.height - padding * 2;
    const maxX = 10;
    const maxY = 50;

    function toCanvasX(x) {
        return padding + (x / maxX) * graphWidth;
    }

    function toCanvasY(y) {
        return canvas.height - padding - (y / maxY) * graphHeight;
    }

    function draw() {
        const m = parseFloat(sliderM.value);
        const c = parseInt(sliderC.value);
        const x = parseInt(sliderX.value);
        const currentY = m * x + c;

        // Update Text
        mVal.innerText = m.toFixed(1);
        cVal.innerText = c;
        xVal.innerText = x;
        eqDisplay.innerText = `y = ${m.toFixed(1)}x + ${c}`;

        // Clear Canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Shaded Area (Integration Preview)
        if (checkArea.checked && x > 0) {
            // Rectangle Part (c * x)
            ctx.fillStyle = 'rgba(52, 152, 219, 0.15)';
            ctx.fillRect(toCanvasX(0), toCanvasY(c), toCanvasX(x) - toCanvasX(0), toCanvasY(0) - toCanvasY(c));

            // Triangle Part (0.5 * x * mx)
            ctx.fillStyle = 'rgba(46, 204, 113, 0.2)';
            ctx.beginPath();
            ctx.moveTo(toCanvasX(0), toCanvasY(c));
            ctx.lineTo(toCanvasX(x), toCanvasY(c));
            ctx.lineTo(toCanvasX(x), toCanvasY(currentY));
            ctx.closePath();
            ctx.fill();
        }

        // Draw Grid Lines & Axes
        ctx.strokeStyle = '#f1f2f6';
        ctx.lineWidth = 1;
        for(let i=0; i<=maxX; i++) {
            ctx.beginPath();
            ctx.moveTo(toCanvasX(i), toCanvasY(0));
            ctx.lineTo(toCanvasX(i), toCanvasY(maxY));
            ctx.stroke();
        }
        for(let i=0; i<=maxY; i+=10) {
            ctx.beginPath();
            ctx.moveTo(toCanvasX(0), toCanvasY(i));
            ctx.lineTo(toCanvasX(maxX), toCanvasY(i));
            ctx.stroke();
        }

        // Main Axes
        ctx.strokeStyle = '#bdc3c7';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(toCanvasX(0), toCanvasY(0));
        ctx.lineTo(toCanvasX(maxX), toCanvasY(0));
        ctx.moveTo(toCanvasX(0), toCanvasY(0));
        ctx.lineTo(toCanvasX(0), toCanvasY(maxY));
        ctx.stroke();

        // Labels
        ctx.fillStyle = '#7f8c8d';
        ctx.font = '11px sans-serif';
        ctx.fillText('0', toCanvasX(0) - 15, toCanvasY(0) + 15);
        ctx.fillText(maxX.toString(), toCanvasX(maxX) - 5, toCanvasY(0) + 15);
        ctx.fillText(maxY.toString(), toCanvasX(0) - 25, toCanvasY(maxY) + 5);

        // Draw the Linear Function Line
        ctx.strokeStyle = '#8e44ad';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(toCanvasX(0), toCanvasY(c));
        ctx.lineTo(toCanvasX(maxX), toCanvasY(m * maxX + c));
        ctx.stroke();

        // Project lines for Current X position
        ctx.strokeStyle = '#7f8c8d';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(toCanvasX(x), toCanvasY(0));
        ctx.lineTo(toCanvasX(x), toCanvasY(currentY));
        ctx.lineTo(toCanvasX(0), toCanvasY(currentY));
        ctx.stroke();
        ctx.setLineDash([]);

        // Current Coordinate Dot
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(toCanvasX(x), toCanvasY(currentY), 6, 0, Math.PI * 2);
        ctx.fill();

        // Draw Slope Step Triangle (Differentiation Preview)
        if (checkRate.checked && x < maxX) {
            let stepX = x;
            let stepY = currentY;
            let nextX = x + 1;
            let nextY = m * nextX + c;

            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(toCanvasX(stepX), toCanvasY(stepY));
            ctx.lineTo(toCanvasX(nextX), toCanvasY(stepY)); // Run
            ctx.lineTo(toCanvasX(nextX), toCanvasY(nextY)); // Rise
            ctx.stroke();

            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 11px sans-serif';
            ctx.fillText(`+1`, toCanvasX(stepX + 0.4), toCanvasY(stepY) + 12);
            ctx.fillText(`+${m}`, toCanvasX(nextX) + 5, toCanvasY(stepY + m/2));
        }

        // Calculate dynamic values for the text box
        const rectArea = c * x;
        const triArea = 0.5 * x * (m * x);
        const totalArea = rectArea + triArea;

        statsDisplay.innerHTML = `
            <strong>At position x = ${x}:</strong><br>
            • Current height (y) = ${currentY.toFixed(1)}<br>
            • Rate of change (Slope) = <strong>${m}</strong> per step<br>
            • Total Area Accumulated = Base Rect (${rectArea}) + Top Tri (${triArea.toFixed(1)}) = <strong>${totalArea.toFixed(1)}</strong>
        `;
    }

    [sliderM, sliderC, sliderX, checkRate, checkArea].forEach(el => el.addEventListener('input', draw));
    draw();
</script>

</body>
</html>
